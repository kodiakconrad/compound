version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/db/query/"
    schema: "internal/db/schema.sql"
    gen:
      go:
        package: "dbgen"
        out: "internal/db"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "boolean"
            go_type: "bool"
          - db_type: "datetime_TEMP"
            go_type:
              import: "compound/internal/dbutil"
              package: "dbutil"
              type: "Time"
          - db_type: "datetime_TEMP"
            nullable: true
            go_type:
              import: "compound/internal/dbutil"
              package: "dbutil"
              type: "NullableTime"
